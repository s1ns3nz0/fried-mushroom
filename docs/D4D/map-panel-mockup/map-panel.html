<title>D4D · 지도 / 경로 — 화진포</title>
<style>
  :root {
    color-scheme: dark;
    --panel:   #0f1312;
    --panel-2: #0b0e0d;
    --brd:     rgba(255,255,255,0.09);
    --brd-2:   rgba(255,255,255,0.06);
    --ink:     #e7ece4;
    --ink-dim: #8a9184;
    --olive:   #d7b64a;
    --route:   #f5a623;
    --green:   #35d07a;
    --red:     #ff5a5f;
    --blue:    #6aa9ff;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --ui: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(120% 90% at 20% 0%, #10231a 0%, #07100c 55%);
    color: var(--ink);
    font-family: var(--ui);
    display: grid; place-items: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .panel {
    width: min(820px, 96vw);
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--brd);
    border-radius: 16px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.55);
  }
  .phead {
    flex: none; height: 52px;
    display: flex; align-items: center; gap: 12px;
    padding: 0 14px 0 18px;
    border-bottom: 1px solid var(--brd-2);
  }
  .phead .ttl { font-size: 15px; font-weight: 700; color: var(--ink); }
  .phead .ctrls { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn {
    display: grid; place-items: center;
    height: 30px; min-width: 30px; padding: 0 9px;
    background: #171b1a; border: 1px solid var(--brd);
    color: var(--ink); border-radius: 8px; cursor: pointer;
    font-family: var(--mono); font-size: 13px;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #202523; border-color: rgba(255,255,255,0.18); }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { outline: 2px solid var(--olive); outline-offset: 1px; }
  .btn.pause.on { color: var(--olive); border-color: rgba(215,182,74,0.5); }
  .btn.on { color: var(--olive); border-color: rgba(215,182,74,0.5); }
  .seg { display: flex; align-items: stretch; background: #141817; border: 1px solid var(--brd); border-radius: 8px; overflow: hidden; }
  .seg .btn { border: 0; border-radius: 0; background: none; height: 28px; }
  .seg .btn:hover { background: #202523; }
  .seg .zl { display: grid; place-items: center; min-width: 42px; font-family: var(--mono); font-size: 13px; color: var(--ink); border-left: 1px solid var(--brd-2); border-right: 1px solid var(--brd-2); }

  .mapwrap { position: relative; width: 100%; aspect-ratio: 2000 / 1091; background: #0a120c; overflow: hidden; }
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .loc {
    position: absolute; top: 10px; left: 10px; z-index: 6;
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px; border-radius: 8px;
    background: rgba(8,12,10,0.68); border: 1px solid var(--brd);
    font-family: var(--mono); font-size: 11px; color: #cfd6ca; letter-spacing: 0.02em;
    backdrop-filter: blur(3px);
  }
  .loc b { color: var(--olive); font-weight: 700; font-family: var(--ui); }
  .loc .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 7px var(--red); }

  .legend {
    position: absolute; bottom: 10px; left: 10px; z-index: 6;
    display: flex; gap: 12px;
    padding: 6px 11px; border-radius: 8px;
    background: rgba(8,12,10,0.68); border: 1px solid var(--brd);
    backdrop-filter: blur(3px); font-size: 11px; color: #cfd6ca;
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 9px; height: 9px; border-radius: 2px; box-shadow: 0 0 6px currentColor; }

  .ping {
    position: absolute; width: 36px; height: 36px; margin: -18px 0 0 -18px;
    border-radius: 50%; pointer-events: none; border: 1.5px solid currentColor;
    opacity: 0; z-index: 5;
    animation: ping 2.4s cubic-bezier(0,0,0.2,1) infinite;
  }
  .ping.green { color: var(--green); }
  .ping.blue  { color: var(--blue); animation-delay: .6s; }
  @keyframes ping {
    0%   { transform: scale(0.3); opacity: 0.9; }
    70%  { opacity: 0; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  .mapwrap.paused .ping { animation-play-state: paused; }
  @media (prefers-reduced-motion: reduce) { .ping { animation: none; } }

  .popup {
    position: absolute; z-index: 8;
    width: 218px; max-width: 82%;
    background: rgba(10,14,12,0.95);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 11px;
    box-shadow: 0 12px 34px rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);
    overflow: hidden;
    opacity: 0; transform: translateY(4px) scale(0.98);
    pointer-events: none; transition: opacity .12s ease, transform .12s ease;
  }
  .popup.on { opacity: 1; transform: none; pointer-events: auto; }
  .popup .ph { display: flex; align-items: center; gap: 8px; padding: 8px 8px 8px 11px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .popup .ph .id { font-size: 15px; font-weight: 800; letter-spacing: .01em; }
  .popup .chip { font-size: 8.5px; letter-spacing: .1em; padding: 2px 6px; border-radius: 4px; font-family: var(--mono); text-transform: uppercase; white-space: nowrap; }
  .popup .close { margin-left: auto; width: 22px; height: 22px; flex: none; display: grid; place-items: center; background: none; border: 0; color: var(--ink-dim); cursor: pointer; border-radius: 6px; font-size: 12px; }
  .popup .close:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .popup .pb { padding: 9px 11px 11px; display: flex; flex-direction: column; gap: 7px; }
  .popup .kv { display: grid; grid-template-columns: 52px 1fr; gap: 3px 9px; font-size: 11px; margin: 0; }
  .popup .kv dt { color: var(--ink-dim); font-size: 8.5px; letter-spacing: .08em; font-family: var(--mono); text-transform: uppercase; padding-top: 2px; }
  .popup .kv dd { margin: 0; color: #dfe4d9; font-variant-numeric: tabular-nums; font-family: var(--mono); }
  .popup .bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .popup .bar > span { display: block; height: 100%; }
  .popup .note { font-size: 10.5px; color: #9aa094; line-height: 1.5; border-left: 2px solid; padding-left: 8px; }
  .popup .acts { display: flex; gap: 6px; margin-top: 1px; }
  .popup .acts button { flex: 1; font-family: var(--ui); font-size: 10.5px; padding: 6px 0; border-radius: 6px; cursor: pointer; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); color: #cfd4c9; }
  .popup .acts button:hover { background: rgba(255,255,255,0.12); color: #fff; }

  .foot { margin-top: 16px; text-align: center; color: var(--ink-dim); font-size: 12px; }
  .foot b { color: var(--olive); font-weight: 600; }
</style>

<div class="panel">
  <div class="phead">
    <span class="ttl">지도 / 경로</span>
    <div class="ctrls">
      <button class="btn on" id="gridtog" aria-label="격자 표시" aria-pressed="true" title="격자 표시/숨김">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1.5" y="1.5" width="11" height="11" rx="1"/><path d="M5 1.5v11M9 1.5v11M1.5 5h11M1.5 9h11"/></svg>
      </button>
      <button class="btn pause on" id="pause" aria-label="일시정지" title="펄스 정지/재생">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="1.5" y="1" width="3" height="10" rx="1"/><rect x="7.5" y="1" width="3" height="10" rx="1"/></svg>
      </button>
      <div class="seg">
        <button class="btn" id="zout" aria-label="축소">−</button>
        <span class="zl" id="zlabel">1×</span>
        <button class="btn" id="zin" aria-label="확대">+</button>
      </div>
    </div>
  </div>

  <div class="mapwrap" id="mapwrap">
    <canvas id="cv"></canvas>
    <div class="loc"><span class="dot"></span><b>화진포 · 고성</b> <span id="coord">52S DH 47500 40400</span></div>
    <div class="legend">
      <span><i style="color:var(--green);background:var(--green)"></i>출발/목표</span>
      <span><i style="color:var(--route);background:var(--route)"></i>경로</span>
      <span><i style="color:var(--red);background:var(--red)"></i>T3 위협</span>
      <span><i style="color:var(--blue);background:var(--blue)"></i>UAV</span>
    </div>
    <div class="ping blue" id="uping"></div>
    <div class="popup" id="popup" role="dialog" aria-label="표적 정보"></div>
  </div>
</div>

      ll:"38.259°N 128.441°E", note:"화진포호 상공 순항 · 링크16 정상 · EO/IR 가동, 호안 관측 중." },
    { id:"WP-2", kind:"waypoint", nx:0.608, ny:0.490, hitR:12,
      type:"경로 통과점", place:"이승만 대통령 별장 상공",
      mgrs:"52S DG 3982 5108", dist:"4.8 km", eta:"17:01Z", note:"이승만 별장 상공 선회점 · 목표 진입 축선 정렬." },
    { id:"목표", kind:"target", nx:0.692, ny:0.395, hitR:16,
      type:"관측 목표 · OBJ", status:"관측 대기", place:"김일성 별장",
      mgrs:"52S DG 4142 5361", ll:"38.279°N 128.457°E", dist:"5.9 km", brg:"048°",
      note:"김일성 별장(화진포) 정밀관측 목표. 진입 후 EO/IR 표적 확인." },
    { id:"T3", kind:"hostile", nx:0.739, ny:0.610, hitR:16,
      type:"근접 위협 · T3", status:"활성·경계", threat:"상(Serious)", conf:"0.92", place:"응봉 고지",
      mgrs:"52S DG 4321 4988", ll:"38.252°N 128.468°E", dist:"640 m", brg:"068°",
      note:"응봉 고지 감제 위협 · 근접 소화기 식별(conf 0.92) · killchain 후기. 회피반경 유지." }
  ];
  function get(id) { return MARKERS.filter(function (m) { return m.id === id; })[0]; }

  // ---- 10자리 MGRS (52S DH, 5E+5N · 1m 정밀도) ----
  // 이미지 가시영역을 GZD 52S / 100km 격자 DH 에 대응(약 9.0km × 5.4km)
  var GZD = "52S DH";
  // 가시영역 프레임: 가로 7km, 세로는 이미지 비율(2000:1191)에 맞춘 약 4.17km
  var EMIN = 44000, EMAX = 51000;                 // easting 범위(m) · 7.0km
  var NMIN = 38682, NMAX = 42500;                 // northing 범위(m) · 3.82km (셀 정사각, 2000:1091 비율)
  function pad5(n) { n = Math.max(0, Math.min(99999, Math.round(n))); return ("00000" + n).slice(-5); }
  function mgrs10(nx, ny) {
    var e = EMIN + nx * (EMAX - EMIN);   // easting  (1m 단위, 5자리)
    var n = NMAX - ny * (NMAX - NMIN);   // northing (1m 단위, 5자리) · 북쪽이 위
    return GZD + " " + pad5(e) + " " + pad5(n);
  }
  // 마커 좌표를 위치에서 계산 → 10자리로 일관되게 반영
  MARKERS.forEach(function (m) { m.mgrs = mgrs10(m.nx, m.ny); });
  // 격자 easting/northing(m) → 정규좌표 (mgrs10 매핑의 역함수)
  function e2nx(E) { return (E - EMIN) / (EMAX - EMIN); }
  function n2ny(N) { return (NMAX - N) / (NMAX - NMIN); }

  function S(nx, ny) {
    return { x: (nx * W - W / 2) * zoom + W / 2, y: (ny * H - H / 2) * zoom + H / 2 };
  }
  function UI() { return '"Pretendard", -apple-system, "Malgun Gothic", sans-serif'; }

  function resize() {
    W = wrap.clientWidth; H = wrap.clientHeight;
    if (!W || !H) return;
    cv.width = W * DPR; cv.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    draw();
    if (selectedId) { var m = get(selectedId); if (m) showPopup(m); }
  }

  function draw() {
    if (!W || !H) return;
    ctx.clearRect(0, 0, W, H);

    // satellite base (zoom about center) with night grade
    ctx.save();
    ctx.translate(W / 2, H / 2); ctx.scale(zoom, zoom); ctx.translate(-W / 2, -H / 2);
    if (ready) {
      ctx.filter = "brightness(0.66) saturate(0.82) contrast(1.06)";
      ctx.drawImage(img, 0, 0, W, H);
      ctx.filter = "none";
    } else {
      ctx.fillStyle = "#0d150f"; ctx.fillRect(0, 0, W, H);
    }
    ctx.restore();

    ctx.fillStyle = "rgba(14,34,50,0.20)"; ctx.fillRect(0, 0, W, H);
    var vg = ctx.createRadialGradient(W/2, H*0.46, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.72);
    vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.42)");
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

    // 통계격자형 정격자 (정북)
    drawGrid();

    // threat blob around T3
    var t3 = get("T3"), t = S(t3.nx, t3.ny);
    var tr = 0.14 * Math.min(W, H) * zoom;
    var gr = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, tr);
    gr.addColorStop(0, "rgba(255,74,74,0.42)"); gr.addColorStop(0.55, "rgba(230,60,55,0.16)"); gr.addColorStop(1, "rgba(230,60,55,0)");
    ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(t.x, t.y, tr, 0, 7); ctx.fill();

    // route line
    ctx.save();
    ctx.strokeStyle = "rgba(245,166,35,0.96)";
    ctx.lineWidth = 3.6; ctx.lineJoin = "round"; ctx.lineCap = "round";
    ctx.shadowColor = "rgba(245,166,35,0.6)"; ctx.shadowBlur = 9;
    ctx.beginPath();
    route.forEach(function (p, k) { var q = S(p[0], p[1]); k ? ctx.lineTo(q.x, q.y) : ctx.moveTo(q.x, q.y); });
    ctx.stroke();
    ctx.restore();

    // markers
    MARKERS.forEach(function (m) {
      var q = S(m.nx, m.ny), sel = m.id === selectedId;
      if (m.kind === "waypoint") { pip(q.x, q.y); if (sel) ring(q.x, q.y, 8); }
      else if (m.kind === "hostile") { diamond(q.x, q.y, "T3"); if (sel) ring(q.x, q.y, 15); }
      else if (m.kind === "uav") { drawUAV(q.x, q.y); if (sel) ring(q.x, q.y, 16); }
      else if (m.kind === "start") { dot(q.x, q.y, "#35d07a"); label("출발지", q.x + 11, q.y - 6, "#cdeecf"); if (sel) ring(q.x, q.y, 11); }
      else if (m.kind === "target") { reticle(q.x, q.y, "#35d07a"); label("목표", q.x + 12, q.y - 8, "#cdeecf"); if (sel) ring(q.x, q.y, 14); }
    });

    place("uping", S(get("UAV-01").nx, get("UAV-01").ny));
  }

  // ---- 통계격자형 정격자 (정북 정렬, EPSG:5179 스타일 · 기본 1km) ----
  var CELL_M = 1000; // 격자 간격(m): 1000=1KM (1칸=1km), 500=500M ...
  function drawGrid() {
    if (!showGrid) return;
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.24)";
    ctx.lineWidth = 0.5;
    ctx.font = "9px ui-monospace, monospace";
    ctx.textBaseline = "top"; ctx.textAlign = "left";
    // 세로선 (easting 등간격 · 1km)
    var eStart = Math.ceil(EMIN / CELL_M) * CELL_M;
    for (var E = eStart; E <= EMAX; E += CELL_M) {
      var a = S(e2nx(E), 0), b = S(e2nx(E), 1);
      if (a.x < -2 || a.x > W + 2) continue;
      ctx.beginPath(); ctx.moveTo(a.x, Math.max(a.y, 0)); ctx.lineTo(a.x, Math.min(b.y, H)); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.fillText(String(Math.round(E / 1000)).slice(-2), a.x + 3, 30);
    }
    // 가로선 (northing 등간격 · 1km)
    var nStart = Math.ceil(NMIN / CELL_M) * CELL_M;
    for (var N = nStart; N <= NMAX; N += CELL_M) {
      var c = S(0, n2ny(N)), d = S(1, n2ny(N));
      if (c.y < -2 || c.y > H + 2) continue;
      ctx.beginPath(); ctx.moveTo(Math.max(c.x, 0), c.y); ctx.lineTo(Math.min(d.x, W), c.y); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.fillText(String(Math.round(N / 1000)).slice(-2), 4, c.y + 2);
    }
    ctx.restore();
  }

  // ---- primitives ----
  function pip(x, y) {
    ctx.save(); ctx.fillStyle = "rgba(245,205,130,0.95)";
    ctx.shadowColor = "rgba(245,166,35,0.7)"; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, 7); ctx.fill(); ctx.restore();
  }
  function dot(x, y, col) {
    ctx.save(); ctx.shadowColor = col; ctx.shadowBlur = 8; ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.fill(); ctx.restore();
  }
  function label(txt, x, y, col) {
    ctx.save(); ctx.font = "700 13px " + UI();
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.lineWidth = 3.5; ctx.strokeStyle = "rgba(0,0,0,0.6)"; ctx.strokeText(txt, x, y);
    ctx.fillStyle = col; ctx.fillText(txt, x, y); ctx.restore();
  }
  function diamond(x, y, txt) {
    ctx.save(); ctx.strokeStyle = "#ff5a5f"; ctx.lineWidth = 2;
    ctx.shadowColor = "rgba(255,90,95,0.85)"; ctx.shadowBlur = 8; var ds = 9;
    ctx.beginPath();
    ctx.moveTo(x, y - ds); ctx.lineTo(x + ds, y); ctx.lineTo(x, y + ds); ctx.lineTo(x - ds, y);
    ctx.closePath(); ctx.stroke(); ctx.shadowBlur = 0;
    label(txt, x + ds + 5, y + 5, "#ff9a9d"); ctx.restore();
  }
  function reticle(x, y, col) {
    ctx.save(); ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.shadowColor = col; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(x, y, 7, 0, 7); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 12, y); ctx.lineTo(x - 4, y); ctx.moveTo(x + 4, y); ctx.lineTo(x + 12, y);
    ctx.moveTo(x, y - 12); ctx.lineTo(x, y - 4); ctx.moveTo(x, y + 4); ctx.lineTo(x, y + 12);
    ctx.stroke(); ctx.restore();
  }
  function drawUAV(x, y) {
    ctx.save(); ctx.translate(x, y);
    ctx.strokeStyle = "#6aa9ff"; ctx.fillStyle = "rgba(106,169,255,0.18)";
    ctx.lineWidth = 2; ctx.lineCap = "round";
    ctx.shadowColor = "rgba(106,169,255,0.75)"; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(-9, -9); ctx.lineTo(9, 9); ctx.moveTo(9, -9); ctx.lineTo(-9, 9); ctx.stroke();
    [[-9,-9],[9,-9],[9,9],[-9,9]].forEach(function (r) { ctx.beginPath(); ctx.arc(r[0], r[1], 4, 0, 7); ctx.fill(); ctx.stroke(); });
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, 7); ctx.fillStyle = "#6aa9ff"; ctx.fill();
    ctx.restore();
  }
  function ring(x, y, r) {
    ctx.save(); ctx.setLineDash([4, 4]);
    ctx.strokeStyle = "rgba(255,255,255,0.92)"; ctx.lineWidth = 1.4;
    ctx.shadowColor = "rgba(255,255,255,0.6)"; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.stroke(); ctx.restore();
  }
  function place(id, q) { var el = document.getElementById(id); el.style.left = q.x + "px"; el.style.top = q.y + "px"; }

  // ---- popup ----
  var KIND = {
    start:    { c:"#35d07a", bg:"rgba(53,208,122,0.16)", tx:"#8fe6b4", tag:"아군 · LP" },
    target:   { c:"#35d07a", bg:"rgba(53,208,122,0.16)", tx:"#8fe6b4", tag:"목표 · OBJ" },
    uav:      { c:"#6aa9ff", bg:"rgba(106,169,255,0.16)", tx:"#a9ccff", tag:"기체 · UAV" },
    hostile:  { c:"#ff5a5f", bg:"rgba(255,90,95,0.16)", tx:"#ff9a9d", tag:"위협 · T3" },
    waypoint: { c:"#f5a623", bg:"rgba(245,166,35,0.15)", tx:"#f7c67a", tag:"경로점 · WP" }
  };
  function esc(s) { return String(s).replace(/[&<>]/g, function (c) { return { "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c]; }); }
  function row(k, v) { return v == null ? "" : "<dt>" + k + "</dt><dd>" + esc(v) + "</dd>"; }
  function battRow(v) {
    var col = v < 25 ? "#ff5a5f" : v < 50 ? "#f5a623" : "#35d07a";
    return '<div style="display:flex;flex-direction:column;gap:3px">' +
      '<div style="display:flex;justify-content:space-between;font-size:8.5px;letter-spacing:.08em;color:var(--ink-dim);font-family:var(--mono);text-transform:uppercase"><span>BATT</span><span>' + v + '%</span></div>' +
      '<div class="bar"><span style="width:' + v + '%;background:' + col + ';box-shadow:0 0 6px ' + col + '"></span></div></div>';
  }
  function showPopup(m) {
    var s = KIND[m.kind];
    var rows = row("유형", m.type) + row("위치", m.place) + row("상태", m.status) + row("위협도", m.threat) + row("신뢰도", m.conf) +
               row("MGRS", m.mgrs) + row("좌표", m.ll) + row("거리", m.dist) + row("방위", m.brg) +
               row("속도", m.speed) + row("방향", m.head) + row("고도", m.alt) + row("링크", m.link) +
               row("ETA", m.eta) + row("시각", m.time);
    var bars = (typeof m.batt === "number") ? battRow(m.batt) : "";
    var acts = m.kind === "hostile" ? '<button style="color:#ff9a9d;border-color:rgba(255,90,95,0.42)">표적지정</button><button>추적</button>'
             : m.kind === "uav" ? '<button>추적</button><button>RTL</button>'
             : m.kind === "target" ? '<button>관측</button><button>경로전송</button>'
             : m.kind === "start" ? '<button>경로</button><button>편집</button>'
             : '<button>이동</button><button>삭제</button>';
    popup.innerHTML =
      '<div class="ph" style="border-bottom-color:' + s.c + '40">' +
        '<span class="id" style="color:' + s.c + '">' + esc(m.id) + '</span>' +
        '<span class="chip" style="background:' + s.bg + ';color:' + s.tx + '">' + s.tag + '</span>' +
        '<button class="close" aria-label="닫기">✕</button>' +
      '</div>' +
      '<div class="pb"><dl class="kv">' + rows + '</dl>' + bars +
        '<div class="note" style="border-left-color:' + s.c + '">' + esc(m.note) + '</div>' +
        '<div class="acts">' + acts + '</div></div>';
    popup.classList.add("on");
    var p = S(m.nx, m.ny);
    var pw = popup.offsetWidth, ph = popup.offsetHeight;
    var left = Math.max(6, Math.min(p.x - pw / 2, W - pw - 6));
    var top = p.y - ph - 18;
    if (top < 6) top = Math.min(p.y + 20, H - ph - 6);
    popup.style.left = left + "px"; popup.style.top = top + "px";
  }
  function hidePopup() { popup.classList.remove("on"); }
  function clearSel() { selectedId = null; hidePopup(); draw(); }

  function hitTest(ev) {
    var r = cv.getBoundingClientRect();
    var mx = ev.clientX - r.left, my = ev.clientY - r.top;
    var hit = null, hd = Infinity;
    MARKERS.forEach(function (m) {
      var p = S(m.nx, m.ny), d = Math.hypot(p.x - mx, p.y - my);
      if (d <= (m.hitR || 14) && d < hd) { hd = d; hit = m; }
    });
    return hit;
  }
  cv.addEventListener("click", function (ev) {
    var hit = hitTest(ev);
    if (hit) { selectedId = hit.id; draw(); showPopup(hit); }
    else clearSel();
  });
  var coordEl = document.getElementById("coord");
  cv.addEventListener("mousemove", function (ev) {
    var r = cv.getBoundingClientRect();
    var mx = ev.clientX - r.left, my = ev.clientY - r.top;
    cv.style.cursor = hitTest(ev) ? "pointer" : "default";
    var nx = ((mx - W / 2) / zoom + W / 2) / W;
    var ny = ((my - H / 2) / zoom + H / 2) / H;
    if (coordEl && nx >= 0 && nx <= 1 && ny >= 0 && ny <= 1) coordEl.textContent = mgrs10(nx, ny);
  });
  popup.addEventListener("click", function (e) { if (e.target.closest(".close")) clearSel(); });
  window.addEventListener("keydown", function (e) { if (e.key === "Escape") clearSel(); });

  // ---- controls ----
  function setZoom(z) {
    zoom = Math.max(1, Math.min(2.4, Math.round(z * 100) / 100));
    var l = Math.round(zoom * 10) / 10;
    document.getElementById("zlabel").textContent = (l % 1 === 0 ? l.toFixed(0) : l.toFixed(1)) + "×";
    draw();
    if (selectedId) { var m = get(selectedId); if (m) showPopup(m); }
  }
  document.getElementById("zin").addEventListener("click", function () { setZoom(zoom + 0.2); });
  document.getElementById("zout").addEventListener("click", function () { setZoom(zoom - 0.2); });
  var gridBtn = document.getElementById("gridtog");
  gridBtn.addEventListener("click", function () {
    showGrid = !showGrid;
    gridBtn.classList.toggle("on", showGrid);
    gridBtn.setAttribute("aria-pressed", showGrid);
    draw();
  });
  var pauseBtn = document.getElementById("pause");
  pauseBtn.addEventListener("click", function () {
    var paused = wrap.classList.toggle("paused");
    pauseBtn.classList.toggle("on", !paused);
    pauseBtn.setAttribute("aria-label", paused ? "재생" : "일시정지");
  });

  window.addEventListener("resize", resize);
  if (window.ResizeObserver) new ResizeObserver(resize).observe(wrap);
  requestAnimationFrame(resize);
})();
</script>
