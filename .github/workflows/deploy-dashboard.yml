# ⚠️ 대시보드는 정적 자산만 배포된다. GCS 탭의 /gcs/run 백엔드는 별도 서비스(로그수집기/ground)로
# 이관 필요 — 정적 S3에서는 동작하지 않음.
#
# 필요한 repo secrets/vars: 없음 (아래 값들이 폴백으로 하드코딩되어 있어 secret/var 미설정 시에도 배포됨).
# repo secrets/vars를 설정하면 그 값이 폴백보다 우선 적용됨:
#   secrets.AWS_ROLE_ARN            ← terraform output deploy_role_arn
#   secrets.AWS_REGION              ← terraform var region (예: ap-northeast-2)
#   vars.DASHBOARD_BUCKET           ← terraform output dashboard_bucket
#   vars.CLOUDFRONT_DISTRIBUTION_ID ← (옵션) enable_cloudfront=true 시 CloudFront 배포 ID
name: deploy-dashboard

on:
  push:
    branches: [main]
    paths:
      - "infra/dashboard/static/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || 'arn:aws:iam::589794546244:role/fried-mushroom-uav-deploy-dev' }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

      - name: Sync static assets to S3
        env:
          # terraform output dashboard_bucket 값을 repo variable로 등록
          BUCKET: ${{ vars.DASHBOARD_BUCKET || 'fried-mushroom-uav-dashboard-20260703162305959200000001' }}
        # Split layout: JS/CSS assets go under /static/ (index.html references
        # them as /static/...), while index.html and config.json sit at the
        # bucket root (frontend fetches /config.json; CloudFront DefaultRootObject=index.html).
        run: |
          aws s3 sync infra/dashboard/static/ "s3://$BUCKET/static/" --delete --exclude "index.html" --exclude "config.json"
          aws s3 cp infra/dashboard/static/index.html "s3://$BUCKET/index.html"
          aws s3 cp infra/dashboard/static/config.json "s3://$BUCKET/config.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID || 'E1VM1G7T42YD2Y' }}" \
            --paths "/*"
