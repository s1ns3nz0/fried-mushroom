# ⚠️ 대시보드는 정적 자산만 배포된다. GCS 탭의 /gcs/run 백엔드는 별도 서비스(로그수집기/ground)로
# 이관 필요 — 정적 S3에서는 동작하지 않음.
#
# 배포는 명시적 opt-in: repo variable `DEPLOY_ENABLED=true` 설정 시에만 실행된다(기본 skip).
# 필요한 repo secrets/vars (식별자는 코드에 하드코딩 금지 — 보안):
#   vars.DEPLOY_ENABLED             ← "true" 로 설정해야 배포 job 실행
#   secrets.AWS_ROLE_ARN            ← terraform output deploy_role_arn
#   secrets.AWS_REGION              ← terraform var region (예: ap-northeast-2)
#   vars.DASHBOARD_BUCKET           ← terraform output dashboard_bucket
#   vars.CLOUDFRONT_DISTRIBUTION_ID ← (옵션) enable_cloudfront=true 시 CloudFront 배포 ID
name: deploy-dashboard

on:
  push:
    branches: [main]
    paths:
      - "infra/dashboard/static/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # F-03(#232): production 환경 게이트 — repo 환경설정에 required reviewers 지정 시 배포 전 수동 승인.
    environment: production
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # 감사(#232) F-11: 체크아웃 토큰 미보존

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync static assets to S3
        env:
          # terraform output dashboard_bucket 값을 repo variable로 등록
          BUCKET: ${{ vars.DASHBOARD_BUCKET }}
          # prod 공개 수집기 URL — repo variables(식별자 하드코딩 금지, #208/#221 원칙)
          COLLECTOR_WS_URL: ${{ vars.COLLECTOR_WS_URL }}
          COLLECTOR_HTTP_URL: ${{ vars.COLLECTOR_HTTP_URL }}
        # Split layout: JS/CSS assets go under /static/ (index.html references
        # them as /static/...), while index.html and config.json sit at the
        # bucket root (frontend fetches /config.json; CloudFront DefaultRootObject=index.html).
        # config.json 은 repo 의 dev(localhost) 파일을 올리지 않는다 — prod 공개 수집기
        # URL(repo vars)로 생성해 올린다. vars 미설정 시 배포를 건너뛰어 기존 prod config 보존.
        run: |
          aws s3 sync infra/dashboard/static/ "s3://$BUCKET/static/" --delete --cache-control "no-cache" --exclude "index.html" --exclude "config.json"
          aws s3 cp infra/dashboard/static/index.html "s3://$BUCKET/index.html" --cache-control "no-cache" --content-type "text/html; charset=utf-8"
          if [ -n "$COLLECTOR_WS_URL" ] && [ -n "$COLLECTOR_HTTP_URL" ]; then
            printf '{"log_ws_url":"%s","collector_http_url":"%s"}\n' "$COLLECTOR_WS_URL" "$COLLECTOR_HTTP_URL" > /tmp/prod-config.json
            aws s3 cp /tmp/prod-config.json "s3://$BUCKET/config.json" --cache-control "no-cache" --content-type "application/json"
          else
            echo "COLLECTOR_WS_URL/HTTP_URL unset — skip config.json (preserve existing prod config)"
          fi

      - name: Invalidate CloudFront cache
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
