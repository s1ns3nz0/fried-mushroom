# CodeQL 정적분석 (SAST) — NIST SP 800-218 SSDF PW.7/PW.8 (자동 취약점 탐지).
# Python 소스를 push/PR/주간 스케줄로 스캔한다. 액션은 커밋 SHA 로 고정(공급망),
# 권한은 이 워크플로우에 필요한 최소(security-events:write) 로만 부여한다.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # 매주 월요일 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # CodeQL 결과 업로드에 필요
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: python

      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
