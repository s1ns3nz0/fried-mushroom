# CI — main push / PR 시 pytest 실행 (README "PR 머지 조건: CI(pytest) 통과 필수")
# step0 이전(pyproject.toml 없음)에는 pytest만 설치해 scripts/ 테스트를 돌리고,
# step0 이후에는 pip install -e '.[dev]' 로 전환된다.
#
# 공급망/최소권한 하드닝 (NIST SP 800-218 SSDF PW.4 / SP 800-204D C-SCRM):
# - 액션은 가변 태그(@v4) 대신 커밋 SHA 로 고정 (태그 재지정/공급망 변조 방지).
# - GITHUB_TOKEN 은 최소권한(contents: read) 으로 축소.
# - job timeout + persist-credentials:false 로 자원/자격증명 노출 축소.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f pyproject.toml ]; then
            # dev extra가 정의돼 있으면 함께, 없으면 본체만 설치
            pip install -e '.[dev]' || pip install -e .
          fi

      - name: Run pytest
        run: python -m pytest -v
