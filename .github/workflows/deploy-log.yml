# 로그수집기(log collector) 이미지 빌드 → ECR push → 지상 EC2에 SSM으로 재기동.
#
# 배포는 명시적 opt-in: repo variable `DEPLOY_ENABLED=true` 설정 시에만 실행된다(기본 skip).
# 필요한 repo secrets/vars (식별자는 코드에 하드코딩 금지 — 보안):
#   vars.DEPLOY_ENABLED      ← "true" 로 설정해야 배포 job 실행
#   secrets.AWS_ROLE_ARN     ← terraform output deploy_role_arn
#   secrets.AWS_REGION       ← terraform var region (예: ap-northeast-2)
#   vars.GROUND_INSTANCE_ID  ← terraform output ground_instance_id
#
# SSM 배포 전제: 지상 EC2에 SSM agent 실행 + AmazonSSMManagedInstanceCore가 붙은
# instance profile 부착 (infra/terraform/instance_profile.tf에서 이미 구성됨).
name: deploy-log-collector

on:
  push:
    branches: [main]
    paths:
      - "infra/log/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    # F-03(#232): production 환경 게이트 — repo 환경설정에 required reviewers 지정 시 배포 전 수동 승인.
    environment: production
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # 감사(#232) F-11: 체크아웃 토큰 미보존

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE: fried-mushroom-uav/log
        run: |
          # 빌드 컨텍스트 = repo 루트 — 이미지에 src/onboard + examples/ 포함(Dockerfile 참고).
          # F-05(#248): ECR IMMUTABLE — 이동태그 :latest 는 push 하지 않는다(재push 불가).
          # 불변 :${sha} 만 push 하고 배포는 이 SHA 로 핀(추적성). 멱등: 동일 SHA 태그가
          # 이미 있으면(재실행/재트리거) IMMUTABLE 재push 가 실패하므로 존재 확인 후 skip.
          if aws ecr describe-images --repository-name "$IMAGE" \
               --image-ids imageTag="${{ github.sha }}" >/dev/null 2>&1; then
            echo "이미지 :${{ github.sha }} 이미 존재 — 재빌드/재push skip (IMMUTABLE 멱등)"
          else
            docker build -f infra/log/Dockerfile -t "$REGISTRY/$IMAGE:${{ github.sha }}" .
            docker push "$REGISTRY/$IMAGE:${{ github.sha }}"
          fi

      - name: Redeploy log container on ground EC2 via SSM
        if: ${{ vars.GROUND_INSTANCE_ID != '' }}
        run: |
          # compose 경로는 terraform templates/ground_user_data.sh.tftpl의 APP_DIR과 일치해야 함.
          aws ssm send-command \
            --instance-ids "${{ vars.GROUND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy log collector ${{ github.sha }}" \
            --parameters 'commands=["cd /opt/fried-mushroom-uav && REG=$(grep ECR_REGISTRY .env | cut -d= -f2) && IMG=\"$REG/fried-mushroom-uav/log:'"${{ github.sha }}"'\" && ( grep -q ^LOG_IMAGE= .env && sed -i \"s#^LOG_IMAGE=.*#LOG_IMAGE=$IMG#\" .env || echo \"LOG_IMAGE=$IMG\" >> .env ) && aws ecr get-login-password --region '"${{ secrets.AWS_REGION }}"' | docker login --username AWS --password-stdin \"$REG\" && docker compose pull log && docker compose up -d log"]'
